<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>見積書作成 | タダサポ 介護情報基盤版</title>

  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Noto+Sans+JP:wght@400;500;600;700;900&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/@tabler/icons-webfont@3.24.0/dist/tabler-icons.min.css">

  <style>
    :root {
      --primary:       #E33535;
      --primary-dark:  #c02828;
      --primary-light: #FFE4EC;
      --text:          #1a1a1a;
      --muted:         #666666;
      --bg:            #FFFFFF;
      --neutral:       #F5F5F5;
      --border:        #e0e0e0;
      --success:       #2a7a3b;
      --radius:        6px;
      --font:          'Noto Sans JP', sans-serif;
    }

    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
    body {
      font-family: var(--font);
      font-size: 14px;
      line-height: 1.6;
      color: var(--text);
      background: #e8e8e8;
    }

    /* ── アプリヘッダー ── */
    .app-header {
      background: white;
      border-bottom: 1px solid var(--border);
      padding: 0 20px;
      height: 60px;
      display: flex;
      align-items: center;
      justify-content: space-between;
      position: sticky;
      top: 0;
      z-index: 100;
      box-shadow: 0 1px 6px rgba(0,0,0,0.08);
      gap: 16px;
    }
    .app-header-left {
      display: flex;
      align-items: center;
      gap: 12px;
      flex-shrink: 0;
    }
    .app-header-logo { height: 36px; width: auto; display: block; }
    .app-header-divider {
      width: 1px; height: 28px;
      background: var(--border);
    }
    .app-header-title {
      font-size: 14px;
      font-weight: 700;
      color: var(--text);
      white-space: nowrap;
    }
    .app-header-actions {
      display: flex;
      align-items: center;
      gap: 8px;
      flex-shrink: 0;
    }
    .hdr-btn {
      display: inline-flex;
      align-items: center;
      gap: 6px;
      padding: 8px 14px;
      border-radius: var(--radius);
      font-family: var(--font);
      font-size: 13px;
      font-weight: 700;
      cursor: pointer;
      border: none;
      transition: all .15s;
      white-space: nowrap;
    }
    .hdr-btn-pdf {
      background: var(--primary);
      color: white;
    }
    .hdr-btn-pdf:hover { background: var(--primary-dark); }
    .hdr-btn-mail {
      background: white;
      color: var(--text);
      border: 1.5px solid var(--border);
    }
    .hdr-btn-mail:hover { border-color: var(--primary); color: var(--primary); background: var(--primary-light); }
    .hdr-btn-back {
      background: none;
      color: var(--muted);
      border: none;
      font-size: 12px;
      padding: 6px 8px;
    }
    .hdr-btn-back:hover { color: var(--primary); }

    /* ── メール送信モーダル ── */
    .modal-overlay {
      display: none;
      position: fixed;
      inset: 0;
      background: rgba(0,0,0,.45);
      z-index: 200;
      align-items: center;
      justify-content: center;
    }
    .modal-overlay.open { display: flex; }
    .modal-box {
      background: white;
      border-radius: 12px;
      padding: 28px 28px 24px;
      width: 480px;
      max-width: 92vw;
      box-shadow: 0 8px 40px rgba(0,0,0,.2);
    }
    .modal-title {
      font-size: 16px;
      font-weight: 700;
      margin-bottom: 4px;
    }
    .modal-desc {
      font-size: 12px;
      color: var(--muted);
      margin-bottom: 20px;
      line-height: 1.6;
    }
    .modal-field { margin-bottom: 14px; }
    .modal-label { font-size: 11px; font-weight: 700; color: var(--muted); margin-bottom: 5px; display: block; }
    .modal-value {
      background: #f5f5f5;
      border: 1px solid var(--border);
      border-radius: var(--radius);
      padding: 8px 10px;
      font-size: 12px;
      line-height: 1.6;
      white-space: pre-wrap;
      word-break: break-all;
      max-height: 120px;
      overflow-y: auto;
      color: var(--text);
    }
    .modal-actions {
      display: flex;
      gap: 8px;
      margin-top: 20px;
    }
    .modal-btn {
      flex: 1;
      padding: 11px;
      border-radius: var(--radius);
      font-family: var(--font);
      font-size: 13px;
      font-weight: 700;
      cursor: pointer;
      border: none;
      display: flex;
      align-items: center;
      justify-content: center;
      gap: 6px;
      transition: all .15s;
    }
    .modal-btn-primary { background: var(--primary); color: white; }
    .modal-btn-primary:hover { background: var(--primary-dark); }
    .modal-btn-secondary { background: #f5f5f5; color: var(--text); }
    .modal-btn-secondary:hover { background: var(--border); }
    .modal-close-row { display: flex; justify-content: flex-end; margin-bottom: 8px; }
    .modal-close-btn {
      background: none; border: none; cursor: pointer;
      color: var(--muted); font-size: 18px; line-height: 1; padding: 2px 4px;
    }
    .modal-close-btn:hover { color: var(--text); }

    /* ── 2ペインレイアウト ── */
    .app-body {
      display: flex;
      height: calc(100vh - 60px);
    }

    /* ── フォームパネル ── */
    .form-panel {
      width: 340px;
      min-width: 300px;
      background: white;
      border-right: 1px solid var(--border);
      overflow-y: auto;
      padding: 20px;
      flex-shrink: 0;
    }
    .form-sec { margin-bottom: 20px; }
    .form-sec-title {
      font-size: 11px;
      font-weight: 700;
      color: var(--muted);
      letter-spacing: 0.06em;
      text-transform: uppercase;
      border-bottom: 1px solid var(--border);
      padding-bottom: 5px;
      margin-bottom: 10px;
    }
    .form-group { margin-bottom: 12px; }
    .form-label {
      display: block;
      font-size: 12px;
      font-weight: 600;
      margin-bottom: 5px;
    }
    .form-label .req { color: var(--primary); }

    input[type="text"],
    input[type="number"],
    select {
      width: 100%;
      padding: 7px 10px;
      border: 1px solid var(--border);
      border-radius: var(--radius);
      font-family: var(--font);
      font-size: 13px;
      color: var(--text);
      transition: border-color .15s;
    }
    input[type="text"]:focus,
    input[type="number"]:focus,
    select:focus {
      outline: none;
      border-color: var(--primary);
      box-shadow: 0 0 0 3px rgba(227,53,53,.12);
    }

    .radio-group, .check-group { display: flex; flex-direction: column; gap: 6px; }

    .radio-card, .check-card {
      display: flex;
      align-items: flex-start;
      gap: 8px;
      padding: 9px 11px;
      border: 1.5px solid var(--border);
      border-radius: var(--radius);
      cursor: pointer;
      transition: all .15s;
    }
    .radio-card:hover, .check-card:hover { border-color: var(--primary); background: var(--primary-light); }
    .radio-card.on, .check-card.on { border-color: var(--primary); background: var(--primary-light); }
    .radio-card input, .check-card input { width: auto; margin-top: 3px; accent-color: var(--primary); }
    .card-name { font-size: 13px; font-weight: 600; }
    .card-desc { font-size: 11px; color: var(--muted); margin-top: 1px; }

    .badge-free { display:inline-block; background:var(--success); color:white; font-size:10px; font-weight:700; padding:1px 5px; border-radius:3px; margin-left:5px; }
    .badge-rec  { display:inline-block; background:var(--primary);  color:white; font-size:10px; font-weight:700; padding:1px 5px; border-radius:3px; margin-left:5px; }

    .qty-row { display:flex; align-items:center; gap:8px; }
    .qty-row input, .qty-row select { width:80px; }
    .qty-note { font-size:11px; color:var(--muted); }

    .print-btn {
      width: 100%;
      padding: 12px;
      background: var(--primary);
      color: white;
      border: none;
      border-radius: var(--radius);
      font-family: var(--font);
      font-size: 14px;
      font-weight: 700;
      cursor: pointer;
      display: flex;
      align-items: center;
      justify-content: center;
      gap: 7px;
      transition: background .15s;
      margin-top: 6px;
    }
    .print-btn:hover { background: var(--primary-dark); }

    .renew-btn {
      font-size: 11px;
      color: var(--muted);
      background: none;
      border: none;
      cursor: pointer;
      text-decoration: underline;
      margin-top: 6px;
      display: block;
    }

    /* ── プレビューパネル ── */
    .preview-panel {
      flex: 1;
      overflow-y: auto;
      padding: 24px 32px;
      display: flex;
      flex-direction: column;
      align-items: center;
    }

    /* ── 見積書ドキュメント ── */
    .est-doc {
      width: 210mm;
      background: white;
      box-shadow: 0 4px 20px rgba(0,0,0,.15);
      padding: 18mm 18mm 16mm;
      font-size: 10.5pt;
      font-family: var(--font);
      color: #111;
    }

    /* ヘッダー */
    .est-head {
      display: flex;
      align-items: center;
      margin-bottom: 7mm;
    }
    .est-logo { height: 44px; display: block; }
    .est-logo-placeholder { height: 44px; display: flex; align-items: center; font-size: 14px; font-weight: 700; color: var(--primary); }
    .est-title-wrap { flex: 1; text-align: center; }
    .est-title { font-size: 22pt; font-weight: 900; letter-spacing: .3em; }
    .est-hanko-wrap { width: 80px; display: flex; justify-content: flex-end; }
    .est-hanko { width: 72px; height: 72px; object-fit: contain; }
    .est-hanko-ph {
      width: 72px; height: 72px;
      border: 2px solid var(--primary);
      display: flex; align-items: center; justify-content: center;
      color: var(--primary); font-size: 11px; text-align: center; line-height: 1.5;
    }

    /* 宛先 + 基本情報 */
    .est-meta {
      display: flex;
      justify-content: space-between;
      align-items: flex-end;
      margin-bottom: 6mm;
    }
    .est-to-name {
      font-size: 15pt;
      font-weight: 700;
      border-bottom: 1.5px solid #111;
      padding-bottom: 3px;
      margin-bottom: 3px;
      min-width: 180px;
    }
    .est-to-honorific { font-size: 10pt; color: var(--muted); }

    .est-info-table { font-size: 9.5pt; line-height: 1.9; text-align: right; }
    .est-info-table td { padding: 0 0 0 12px; }
    .est-info-table .lbl { color: var(--muted); }
    .est-info-table .val { font-weight: 600; }

    /* 発行者情報 */
    .est-issuer {
      background: #fafafa;
      border: 1px solid var(--border);
      border-radius: var(--radius);
      padding: 8px 14px;
      margin-bottom: 7mm;
      font-size: 9.5pt;
      line-height: 1.8;
    }
    .est-issuer-name { font-size: 11pt; font-weight: 700; margin-bottom: 2px; }

    /* 明細テーブル */
    .est-table {
      width: 100%;
      border-collapse: collapse;
      font-size: 10pt;
      margin-bottom: 5mm;
    }
    .est-table th {
      background: #222;
      color: white;
      padding: 7px 10px;
      font-size: 9.5pt;
      font-weight: 600;
    }
    .est-table th:first-child { text-align: left; }
    .est-table th:nth-child(2),
    .est-table th:nth-child(3) { text-align: center; }
    .est-table th:last-child { text-align: right; }

    .est-table td {
      padding: 8px 10px;
      border-bottom: 1px solid #eee;
      vertical-align: top;
    }
    .est-table tr:last-child td { border-bottom: none; }
    .est-table td:nth-child(2),
    .est-table td:nth-child(3) { text-align: center; }
    .est-table td:last-child { text-align: right; font-weight: 600; }

    .est-sub-note { font-size: 8.5pt; color: var(--muted); margin-top: 2px; padding-left: 2px; }
    .est-badge-free { display:inline-block; background:var(--success); color:white; font-size:8.5pt; font-weight:700; padding:1px 5px; border-radius:3px; margin-left:5px; }

    /* 合計エリア */
    .est-totals-wrap {
      display: flex;
      justify-content: flex-end;
      margin-bottom: 5mm;
    }
    .est-totals { width: 270px; }
    .est-total-row {
      display: flex;
      justify-content: space-between;
      align-items: center;
      padding: 4px 0;
      font-size: 10pt;
    }
    .est-total-row.sub { color: var(--muted); font-size: 9.5pt; }
    .est-total-row.grand {
      font-size: 12.5pt;
      font-weight: 700;
      border-top: 2px solid #111;
      border-bottom: 1px solid #111;
      padding: 6px 0;
      margin: 2px 0;
    }
    .est-total-row.sub-grant { color: var(--success); font-weight: 600; font-size: 9.5pt; border-top: 1px solid #eee; padding-top: 6px; }
    .est-total-row.self {
      font-size: 14pt;
      font-weight: 900;
      color: var(--primary);
      border-top: 2.5px solid var(--primary);
      padding-top: 7px;
      margin-top: 2px;
    }
    .badge-zero {
      display: inline-block;
      background: var(--success);
      color: white;
      font-size: 9pt;
      font-weight: 700;
      padding: 2px 10px;
      border-radius: 20px;
      margin-left: 7px;
      vertical-align: middle;
    }

    /* 備考 */
    .est-notes {
      font-size: 8.5pt;
      color: var(--muted);
      line-height: 1.8;
      border-top: 1px solid var(--border);
      padding-top: 4mm;
      margin-top: 4mm;
    }
    .est-notes strong { color: var(--text); }

    /* ── 印刷 ── */
    @media print {
      * { -webkit-print-color-adjust: exact !important; print-color-adjust: exact !important; }
      body { background: white; }
      .app-header,
      .form-panel,
      .modal-overlay { display: none !important; }
      .app-body { height: auto; display: block; }
      .preview-panel { padding: 0; background: white; }
      .est-doc { box-shadow: none; width: 100%; padding: 0; }
      @page { size: A4 portrait; margin: 15mm; }
    }

    @media (max-width: 820px) {
      .app-body { flex-direction: column; height: auto; }
      .form-panel { width: 100%; }
      .est-doc { width: 100%; }
    }
  </style>
</head>
<body>

<header class="app-header">
  <div class="app-header-left">
    <a href="index.html">
      <img src="images/tadakayo_logo.png" alt="タダカヨ" class="app-header-logo"
           onerror="this.outerHTML='<span style=\'font-size:13px;font-weight:700;color:#E33535\'>タダカヨ</span>'">
    </a>
    <div class="app-header-divider"></div>
    <span class="app-header-title">
      <i class="ti ti-file-invoice" style="font-size:16px;vertical-align:-2px;margin-right:4px;color:#E33535"></i>
      見積書作成
    </span>
  </div>
  <div class="app-header-actions">
    <button class="hdr-btn hdr-btn-mail" onclick="openEmailModal()">
      <i class="ti ti-mail"></i>メールで送信
    </button>
    <button class="hdr-btn hdr-btn-pdf" onclick="downloadPDF()">
      <i class="ti ti-download"></i>PDFダウンロード
    </button>
  </div>
</header>

<!-- ======== メール送信モーダル ======== -->
<div class="modal-overlay" id="emailModal" onclick="closeEmailModalIfOutside(event)">
  <div class="modal-box">
    <div class="modal-close-row">
      <button class="modal-close-btn" onclick="closeEmailModal()" aria-label="閉じる">×</button>
    </div>
    <div class="modal-title"><i class="ti ti-mail" style="color:#E33535;margin-right:6px"></i>メールで送信</div>
    <div class="modal-desc">
      下の「メールを開く」ボタンでメールアプリが起動します。<br>
      送信前にPDFをダウンロードして添付してください。
    </div>
    <div class="modal-field">
      <span class="modal-label">件名</span>
      <div class="modal-value" id="mailSubject"></div>
    </div>
    <div class="modal-field">
      <span class="modal-label">本文（コピーしてお使いください）</span>
      <div class="modal-value" id="mailBody"></div>
    </div>
    <div class="modal-actions">
      <button class="modal-btn modal-btn-secondary" onclick="copyMailBody()">
        <i class="ti ti-copy"></i>本文をコピー
      </button>
      <button class="modal-btn modal-btn-primary" id="mailtoBtn" onclick="openMailto()">
        <i class="ti ti-mail-forward"></i>メールを開く
      </button>
    </div>
  </div>
</div>

<div class="app-body">

  <!-- ======== フォームパネル ======== -->
  <div class="form-panel" id="formPanel">

    <div class="form-sec">
      <div class="form-sec-title">宛先情報</div>
      <div class="form-group">
        <label class="form-label" for="clientName">法人名・事業所名<span class="req">*</span></label>
        <input type="text" id="clientName" placeholder="例: 社会福祉法人〇〇 △△苑" oninput="render()">
      </div>
    </div>

    <div class="form-sec">
      <div class="form-sec-title">補助金プラン（事業所種別）</div>
      <div class="radio-group" id="planGroup">
        <label class="radio-card on" data-val="houmon">
          <input type="radio" name="plan" value="houmon" checked>
          <div>
            <div class="card-name">訪問・通所系</div>
            <div class="card-desc">助成金上限 ¥64,000 ／ 最大3台</div>
          </div>
        </label>
        <label class="radio-card" data-val="kyojyu">
          <input type="radio" name="plan" value="kyojyu">
          <div>
            <div class="card-name">居住・入所系</div>
            <div class="card-desc">助成金上限 ¥55,000 ／ 最大2台</div>
          </div>
        </label>
        <label class="radio-card" data-val="other">
          <input type="radio" name="plan" value="other">
          <div>
            <div class="card-name">その他</div>
            <div class="card-desc">助成金上限 ¥42,000 ／ 最大1台</div>
          </div>
        </label>
      </div>
    </div>

    <div class="form-sec">
      <div class="form-sec-title">カードリーダー種別</div>
      <div class="radio-group" id="readerGroup">
        <label class="radio-card on" data-val="bt">
          <input type="radio" name="reader" value="bt" checked>
          <div>
            <div class="card-name">CIR415A（Bluetooth 無線）</div>
            <div class="card-desc">¥9,000/台（税別）</div>
          </div>
        </label>
        <label class="radio-card" data-val="usb">
          <input type="radio" name="reader" value="usb">
          <div>
            <div class="card-name">CIR315A（USB-A/C 有線）</div>
            <div class="card-desc">¥5,000/台（税別）</div>
          </div>
        </label>
      </div>
    </div>

    <div class="form-sec">
      <div class="form-sec-title">台数</div>
      <div class="form-group">
        <label class="form-label">補助金対象台数</label>
        <div class="qty-row">
          <select id="subsidyQty" onchange="render()">
            <option value="3" selected>3台</option>
            <option value="2">2台</option>
            <option value="1">1台</option>
          </select>
          <span class="qty-note" id="maxNote">（最大3台）</span>
        </div>
      </div>
      <div class="form-group">
        <label class="form-label">補助金対象外の追加台数</label>
        <div class="qty-row">
          <input type="number" id="extraQty" value="0" min="0" max="99" oninput="render()">
          <span class="qty-note">台（自己負担）</span>
        </div>
      </div>
    </div>

    <div class="form-sec">
      <div class="form-sec-title">サポートオプション</div>
      <div class="check-group">
        <label class="check-card on" id="supportCard">
          <input type="checkbox" id="supportCheck" checked onchange="syncCard('supportCard','supportCheck'); render()">
          <div>
            <div class="card-name">補助金申請サポート<span class="badge-free">無料</span></div>
            <div class="card-desc">介護情報基盤助成金の申請代行（タダカヨが完全無料でサポート）</div>
          </div>
        </label>
        <label class="check-card on" id="accompanyCard">
          <input type="checkbox" id="accompanyCheck" checked onchange="syncCard('accompanyCard','accompanyCheck'); render()">
          <div>
            <div class="card-name">伴走支援費（1年間）<span class="badge-rec">推奨</span></div>
            <div class="card-desc" id="accompanyNote">¥30,000（税別）— 導入後1年間の伴走サポート</div>
          </div>
        </label>
      </div>
    </div>

    <button class="print-btn" onclick="downloadPDF()">
      <i class="ti ti-download"></i>
      PDFダウンロード
    </button>
    <button class="print-btn" onclick="openEmailModal()" style="margin-top:8px;background:white;color:var(--primary);border:1.5px solid var(--primary);">
      <i class="ti ti-mail"></i>
      メールで送信
    </button>
    <button class="renew-btn" onclick="renewEstNo()">見積番号を更新する</button>

  </div><!-- /form-panel -->

  <!-- ======== プレビューパネル ======== -->
  <div class="preview-panel">
    <div class="est-doc" id="estDoc">

      <!-- ヘッダー -->
      <div class="est-head">
        <div style="flex:0 0 auto">
          <img src="images/tadakayo_logo.png" alt="タダカヨ" class="est-logo"
               onerror="this.outerHTML='<div class=\'est-logo-placeholder\'>特定非営利活動法人タダカヨ</div>'">
        </div>
        <div class="est-title-wrap">
          <div class="est-title">見　積　書</div>
        </div>
        <div class="est-hanko-wrap">
          <img src="images/hanko.png" alt="印鑑" class="est-hanko" id="hankoImg"
               onerror="this.outerHTML='<div class=\'est-hanko-ph\'>印<br>鑑</div>'">
        </div>
      </div>

      <!-- 宛先 + 基本情報 -->
      <div class="est-meta">
        <div>
          <div class="est-to-name" id="prevClient">（法人名・事業所名を入力）</div>
          <div class="est-to-honorific">御中</div>
        </div>
        <table class="est-info-table">
          <tr><td class="lbl">見積番号</td><td class="val" id="prevEstNo">—</td></tr>
          <tr><td class="lbl">見積日</td><td class="val" id="prevDate">—</td></tr>
          <tr><td class="lbl">有効期限</td><td class="val" id="prevExpiry">—</td></tr>
        </table>
      </div>

      <!-- 発行者情報 -->
      <div class="est-issuer">
        <div class="est-issuer-name">特定非営利活動法人タダカヨ</div>
        <div style="font-size:9pt; color:var(--muted); line-height:1.9">
          〒143-0014　東京都大田区大森中2-1-20-1001<br>
          TEL: 050-6872-9884　／　担当: 佐藤拡史
        </div>
      </div>

      <!-- 明細テーブル -->
      <table class="est-table">
        <thead>
          <tr>
            <th style="width:46%;text-align:left">品名・摘要</th>
            <th style="width:9%">数量</th>
            <th style="width:22%">単価（税別）</th>
            <th style="width:23%">金額（税別）</th>
          </tr>
        </thead>
        <tbody id="itemsBody"></tbody>
      </table>

      <!-- 合計 -->
      <div class="est-totals-wrap">
        <div class="est-totals" id="totalsArea"></div>
      </div>

      <!-- 備考 -->
      <div class="est-notes" id="notesArea"></div>

    </div><!-- /est-doc -->
  </div><!-- /preview-panel -->

</div><!-- /app-body -->

<script>
  /* ──────── 定数 ──────── */
  const PLANS = {
    houmon: { label: '訪問・通所系', maxQty: 3, limit: 64000, accompany: 30000 },
    kyojyu: { label: '居住・入所系', maxQty: 2, limit: 55000, accompany: 31000 },
    other:  { label: 'その他',       maxQty: 1, limit: 42000, accompany: 28000 },
  };
  const READERS = {
    bt:  { label: 'CIR415A カードリーダー（Bluetooth）', unitPrice: 9000 },
    usb: { label: 'CIR315A カードリーダー（USB-A/C）',  unitPrice: 5000 },
  };

  let estNo = '';

  /* ──────── 初期化 ──────── */
  window.addEventListener('DOMContentLoaded', () => {
    estNo = genEstNo();
    initRadios('planGroup',  'plan',   v => { syncPlanQty(v); syncAccompanyNote(v); render(); });
    initRadios('readerGroup','reader', () => render());
    document.getElementById('prevEstNo').textContent = estNo;
    setDates();
    syncPlanQty('houmon');
    render();
  });

  /* ──────── ラジオ初期化 ──────── */
  function initRadios(groupId, name, onChange) {
    document.getElementById(groupId).querySelectorAll('.radio-card').forEach(card => {
      card.addEventListener('click', () => {
        document.getElementById(groupId).querySelectorAll('.radio-card').forEach(c => c.classList.remove('on'));
        card.classList.add('on');
        const input = card.querySelector('input');
        input.checked = true;
        onChange(input.value);
      });
    });
  }

  /* ──────── チェックカード同期 ──────── */
  function syncCard(cardId, checkId) {
    document.getElementById(cardId).classList.toggle('on', document.getElementById(checkId).checked);
  }

  /* ──────── 台数セレクト更新 ──────── */
  function syncPlanQty(planKey) {
    const plan = PLANS[planKey];
    const sel  = document.getElementById('subsidyQty');
    const cur  = parseInt(sel.value) || plan.maxQty;
    sel.innerHTML = '';
    for (let i = plan.maxQty; i >= 1; i--) {
      const o = document.createElement('option');
      o.value = i; o.text = `${i}台`;
      if (i === Math.min(cur, plan.maxQty)) o.selected = true;
      sel.appendChild(o);
    }
    document.getElementById('maxNote').textContent = `（最大${plan.maxQty}台）`;
  }
  function syncAccompanyNote(planKey) {
    const plan = PLANS[planKey];
    document.getElementById('accompanyNote').textContent =
      `¥${plan.accompany.toLocaleString()}（税別）— 導入後1年間の伴走サポート`;
  }

  /* ──────── 日付 ──────── */
  function setDates() {
    const today  = new Date();
    const expiry = new Date(today);
    expiry.setMonth(expiry.getMonth() + 1);
    document.getElementById('prevDate').textContent   = fmtDate(today);
    document.getElementById('prevExpiry').textContent = fmtDate(expiry);
  }
  function fmtDate(d) {
    return `${d.getFullYear()}年${d.getMonth()+1}月${d.getDate()}日`;
  }
  function fmtY(d) { return `${d.getFullYear()}年${d.getMonth()+1}月${d.getDate()}日`; }

  /* ──────── 見積番号 ──────── */
  function genEstNo() {
    const d = new Date();
    const key = `estSeq_${d.toISOString().slice(0,10).replace(/-/g,'')}`;
    let seq = parseInt(localStorage.getItem(key) || '0') + 1;
    localStorage.setItem(key, seq);
    return `EST-${d.toISOString().slice(0,10).replace(/-/g,'')}-${String(seq).padStart(3,'0')}`;
  }
  function renewEstNo() {
    estNo = genEstNo();
    document.getElementById('prevEstNo').textContent = estNo;
  }

  /* ──────── PDFダウンロード ──────── */
  function downloadPDF() {
    const clientName = document.getElementById('clientName').value.trim();
    const today = new Date();
    const dateStr = `${today.getFullYear()}${String(today.getMonth()+1).padStart(2,'0')}${String(today.getDate()).padStart(2,'0')}`;
    const orig = document.title;
    document.title = clientName
      ? `見積書_タダサポ_${clientName}_${dateStr}`
      : `見積書_タダサポ_${dateStr}`;
    window.print();
    setTimeout(() => { document.title = orig; }, 1500);
  }

  /* ──────── メール送信モーダル ──────── */
  function openEmailModal() {
    const planKey   = document.querySelector('input[name="plan"]:checked').value;
    const rdKey     = document.querySelector('input[name="reader"]:checked').value;
    const plan      = PLANS[planKey];
    const reader    = READERS[rdKey];
    const clientName = document.getElementById('clientName').value.trim() || '貴事業所';
    const subsidyQty = parseInt(document.getElementById('subsidyQty').value) || 1;
    const extraQty   = Math.max(0, parseInt(document.getElementById('extraQty').value) || 0);
    const withAccompany = document.getElementById('accompanyCheck').checked;

    const totalQty  = subsidyQty + extraQty;
    const devExcl   = reader.unitPrice * totalQty;
    const accExcl   = withAccompany ? plan.accompany : 0;
    const totalExcl = devExcl + accExcl;
    const totalTax  = Math.floor(devExcl * 0.1) + Math.floor(accExcl * 0.1);
    const totalIncl = totalExcl + totalTax;
    const grantAmt  = Math.min(plan.limit, totalIncl);
    const selfPay   = Math.max(0, totalIncl - grantAmt);

    const today  = new Date();
    const expiry = new Date(today); expiry.setMonth(expiry.getMonth() + 1);

    const subject = `【タダサポ 介護情報基盤版】お見積書のご案内 — ${clientName} 御中`;

    const body = `${clientName} ご担当者様

お世話になっております。
NPO法人タダカヨ（タダサポ 介護情報基盤版）です。

この度は介護情報基盤への対応について、お見積書をご用意いたしました。

━━━━━━━━━━━━━━━━━━━━━
　お見積書 概要（${fmtDate(today)}付）
━━━━━━━━━━━━━━━━━━━━━
  見積番号　：${estNo}
  事業所種別：${plan.label}
  機器　　　：${reader.label}（${totalQty}台）
  合計金額　：${yen(totalIncl)}（税込）
  介護情報基盤助成金：−${yen(grantAmt)}
  お客様ご負担額：${yen(selfPay)}${selfPay === 0 ? '（自己負担 ¥0）' : ''}

  有効期限：${fmtDate(expiry)}まで
━━━━━━━━━━━━━━━━━━━━━

詳細はPDFの見積書をご確認ください。
ご不明な点はお気軽にお問い合わせください。

─────────────────────
特定非営利活動法人タダカヨ
TEL: 050-6872-9884
https://tadakayo.jp/
─────────────────────`;

    document.getElementById('mailSubject').textContent = subject;
    document.getElementById('mailBody').textContent    = body;
    document.getElementById('emailModal').classList.add('open');
  }

  function closeEmailModal() {
    document.getElementById('emailModal').classList.remove('open');
  }
  function closeEmailModalIfOutside(e) {
    if (e.target === document.getElementById('emailModal')) closeEmailModal();
  }

  function openMailto() {
    const subject = document.getElementById('mailSubject').textContent;
    const body    = document.getElementById('mailBody').textContent;
    window.location.href = `mailto:?subject=${encodeURIComponent(subject)}&body=${encodeURIComponent(body)}`;
  }

  function copyMailBody() {
    const body = document.getElementById('mailBody').textContent;
    navigator.clipboard.writeText(body).then(() => {
      const btn = event.currentTarget;
      const orig = btn.innerHTML;
      btn.innerHTML = '<i class="ti ti-check"></i>コピーしました';
      btn.style.background = '#d4edda';
      setTimeout(() => { btn.innerHTML = orig; btn.style.background = ''; }, 2000);
    });
  }

  /* ──────── 金額フォーマット ──────── */
  function yen(n) { return '¥' + n.toLocaleString('ja-JP'); }

  /* ──────── メインレンダリング ──────── */
  function render() {
    const planKey  = document.querySelector('input[name="plan"]:checked').value;
    const rdKey    = document.querySelector('input[name="reader"]:checked').value;
    const plan     = PLANS[planKey];
    const reader   = READERS[rdKey];

    const clientName   = document.getElementById('clientName').value.trim() || '（法人名・事業所名を入力）';
    const subsidyQty   = parseInt(document.getElementById('subsidyQty').value)  || 1;
    const extraQty     = Math.max(0, parseInt(document.getElementById('extraQty').value) || 0);
    const withSupport  = document.getElementById('supportCheck').checked;
    const withAccompany= document.getElementById('accompanyCheck').checked;

    /* 宛先 */
    document.getElementById('prevClient').textContent = clientName;

    /* 計算 */
    const totalQty   = subsidyQty + extraQty;
    const devExcl    = reader.unitPrice * totalQty;
    const devTax     = Math.floor(devExcl * 0.1);
    const devIncl    = devExcl + devTax;

    const accExcl    = withAccompany ? plan.accompany : 0;
    const accTax     = Math.floor(accExcl * 0.1);
    const accIncl    = accExcl + accTax;

    const totalExcl  = devExcl + accExcl;
    const totalTax   = devTax  + accTax;
    const totalIncl  = devIncl + accIncl;

    const grantAmt   = Math.min(plan.limit, totalIncl);
    const selfPay    = Math.max(0, totalIncl - grantAmt);

    /* ── 明細テーブル ── */
    const tbody = document.getElementById('itemsBody');
    tbody.innerHTML = '';

    const extraNote = extraQty > 0
      ? `<div class="est-sub-note">補助金対象 ${subsidyQty}台　補助金対象外 ${extraQty}台（自己負担）</div>`
      : `<div class="est-sub-note">補助金対象 ${subsidyQty}台</div>`;

    tbody.innerHTML += `<tr>
      <td>${reader.label}${extraNote}</td>
      <td>${totalQty}台</td>
      <td>${yen(reader.unitPrice)}</td>
      <td>${yen(devExcl)}</td>
    </tr>`;

    if (withSupport) {
      tbody.innerHTML += `<tr>
        <td>補助金申請サポート<span class="est-badge-free">無料</span>
          <div class="est-sub-note">介護情報基盤助成金の申請代行をタダカヨが全面サポート</div>
        </td>
        <td>1式</td>
        <td>¥0</td>
        <td>¥0</td>
      </tr>`;
    }

    if (withAccompany) {
      tbody.innerHTML += `<tr>
        <td>伴走支援費（1年間）
          <div class="est-sub-note">導入設定・マイナ資格確認アプリ設定・導入後1年間サポート</div>
        </td>
        <td>1式</td>
        <td>${yen(plan.accompany)}</td>
        <td>${yen(accExcl)}</td>
      </tr>`;
    }

    /* ── 合計 ── */
    const today = new Date();
    const expiry = new Date(today);
    expiry.setMonth(expiry.getMonth() + 1);

    const zeroBadge = selfPay === 0 ? `<span class="badge-zero">自己負担 ¥0</span>` : '';

    document.getElementById('totalsArea').innerHTML = `
      <div class="est-total-row sub">
        <span>小計（税別）</span><span>${yen(totalExcl)}</span>
      </div>
      <div class="est-total-row sub">
        <span>消費税（10%）</span><span>${yen(totalTax)}</span>
      </div>
      <div class="est-total-row grand">
        <span>合計（税込）</span><span>${yen(totalIncl)}</span>
      </div>
      <div class="est-total-row sub-grant">
        <span>介護情報基盤助成金（${plan.label} 上限${yen(plan.limit)}）</span>
        <span>−${yen(grantAmt)}</span>
      </div>
      <div class="est-total-row self">
        <span>お客様ご負担額</span>
        <span>${yen(selfPay)}${zeroBadge}</span>
      </div>
    `;

    /* ── 備考 ── */
    const extraNote2 = extraQty > 0
      ? `<br>・補助金対象外${extraQty}台分（${yen(reader.unitPrice * extraQty + Math.floor(reader.unitPrice * extraQty * 0.1))}税込）はお客様のご負担となります。`
      : '';

    document.getElementById('notesArea').innerHTML = `
      <strong>備考・ご案内</strong><br>
      ・本見積書の有効期限は<strong>${fmtDate(expiry)}</strong>までです。<br>
      ・助成金は介護情報基盤整備助成金（定額型・${plan.label}区分）を適用した場合の金額です。<br>
      ・助成金の支給には事業所様の申請要件の充足が必要です。詳細はお問い合わせください。<br>
      ・本見積書の金額は消費税10%を含む税込金額で算出しています。${extraNote2}
    `;
  }
</script>
</body>
</html>
