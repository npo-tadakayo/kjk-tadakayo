<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>支援報告書 — タダカヨ CRM</title>
  <link rel="icon" type="image/png" href="/favicon.png">
  <link rel="apple-touch-icon" href="/favicon.png">
  <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/@tabler/icons-webfont@3.24.0/dist/tabler-icons.min.css">
  <link rel="stylesheet" href="https://fonts.googleapis.com/css2?family=Noto+Serif+JP:wght@600;700&family=Noto+Sans+JP:wght@400;500;700&display=swap">
  <style>
    :root {
      --ink: #2C2416; --muted: #6a5e48; --line: #E8E4DC;
      --brand: #E33535; --bg: #FAFAF8;
    }
    * { box-sizing: border-box; }
    body {
      margin: 0; background: var(--bg); color: var(--ink);
      font-family: "Noto Sans JP", "Hiragino Sans", system-ui, sans-serif;
      font-size: 13px; line-height: 1.7;
    }
    .toolbar {
      position: sticky; top: 0; display: flex; justify-content: space-between;
      align-items: center; gap: 12px; padding: 12px 20px;
      background: #fff; border-bottom: 1px solid var(--line); z-index: 10;
    }
    .toolbar .btn {
      border: none; border-radius: 8px; padding: 10px 18px; font-size: 14px;
      cursor: pointer; display: inline-flex; align-items: center; gap: 6px;
    }
    .btn-print { background: #c02828; color: #fff; } /* 白文字コントラスト確保のため primary-dark（crm.cssと同値） */
    .btn-back { background: var(--line); color: var(--ink); text-decoration: none; }
    .sheet {
      max-width: 800px; margin: 20px auto; background: #fff;
      border: 1px solid var(--line); border-radius: 6px; padding: 48px 56px;
    }
    .doc-head { display: flex; justify-content: space-between; align-items: flex-start; border-bottom: 2px solid var(--brand); padding-bottom: 16px; margin-bottom: 24px; }
    .doc-brand { font-family: "Noto Serif JP", serif; font-weight: 600; }
    .doc-brand .svc { font-size: 18px; color: var(--brand); }
    .doc-brand .org { font-size: 12px; color: var(--muted); margin-top: 2px; }
    .doc-title { text-align: right; }
    .doc-title h1 { font-family: "Noto Serif JP", serif; font-size: 22px; margin: 0 0 4px; }
    .doc-title .meta { font-size: 12px; color: var(--muted); }
    h2.sec {
      font-family: "Noto Serif JP", serif; font-size: 15px; margin: 28px 0 10px;
      padding-left: 10px; border-left: 4px solid var(--brand);
    }
    table.kv { width: 100%; border-collapse: collapse; }
    table.kv th, table.kv td { text-align: left; padding: 7px 10px; border-bottom: 1px solid var(--line); vertical-align: top; }
    table.kv th { width: 32%; color: var(--muted); font-weight: 600; background: var(--bg); }
    .timeline-item, .session-item { padding: 10px 0; border-bottom: 1px solid var(--line); }
    .ti-date { font-weight: 600; font-size: 12px; color: #c02828; } /* 小サイズ文字のためコントラストの高い primary-dark */
    .ti-body { white-space: pre-wrap; margin-top: 2px; }
    .muted { color: var(--muted); }
    .footer { margin-top: 36px; padding-top: 14px; border-top: 1px solid var(--line); font-size: 11px; color: var(--muted); text-align: center; }
    .loading { text-align: center; padding: 60px; color: var(--muted); }
    @media print {
      .toolbar { display: none; }
      body { background: #fff; font-size: 11.5px; }
      .sheet { max-width: none; margin: 0; border: none; border-radius: 0; padding: 0; }
      h2.sec, .doc-head { break-after: avoid; }
      .timeline-item, .session-item { break-inside: avoid; }
      @page { margin: 16mm 14mm; }
    }
  </style>
</head>
<body>
  <div class="toolbar">
    <a class="btn btn-back" href="#" id="backBtn"><i class="ti ti-arrow-left"></i> 案件へ戻る</a>
    <button class="btn btn-print" id="printBtn" type="button"><i class="ti ti-printer"></i> 印刷 / PDF保存</button>
  </div>

  <div class="sheet" id="sheet">
    <div class="loading" id="loadingEl"><i class="ti ti-loader-2 ti-spin"></i> 読み込み中...</div>
    <div id="reportBody" style="display:none"></div>
  </div>

  <script src="/js/firebase-config.js"></script>
  <script src="/js/report.js" type="module"></script>
</body>
</html>
