<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>ダッシュボード — タダカヨ CRM</title>
  <link rel="icon" type="image/png" href="/favicon.png">
  <link rel="apple-touch-icon" href="/favicon.png">
  <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/@tabler/icons-webfont@3.24.0/dist/tabler-icons.min.css">
  <link rel="stylesheet" href="/css/crm.css">
</head>
<body>
  <div class="layout">
    <aside class="sidebar">
      <div class="sidebar-brand">
        <div class="app-name">タダカヨ CRM</div>
        <div class="app-sub">介護情報基盤伴走支援</div>
      </div>
      <nav class="sidebar-nav">
        <a class="nav-item active" href="/dashboard.html">
          <i class="ti ti-chart-bar" aria-hidden="true"></i>ダッシュボード
        </a>
        <a class="nav-item" href="/cases.html">
          <i class="ti ti-layout-list" aria-hidden="true"></i>案件一覧
        </a>
        <a class="nav-item" href="/kanban.html">
          <i class="ti ti-layout-kanban" aria-hidden="true"></i>カンバン
        </a>
        <a class="nav-item" href="/supply.html"><i class="ti ti-package" aria-hidden="true"></i>供給管理</a>
        <a class="nav-item" href="/simulator.html"><i class="ti ti-calculator" aria-hidden="true"></i>売上シミュレーター</a>
        <a class="nav-item" href="/settings.html"><i class="ti ti-settings" aria-hidden="true"></i>設定</a>
        <a class="nav-item" href="/users.html"><i class="ti ti-users" aria-hidden="true"></i>ユーザー管理</a>
        <div style="height:1px;background:var(--color-line);margin:8px 12px"></div>
        <a class="nav-item" href="/manual.html"><i class="ti ti-book-2" aria-hidden="true"></i>マニュアル</a>
        <a class="nav-item" href="/engineering.html"><i class="ti ti-notebook" aria-hidden="true"></i>エンジニアノート</a>
      </nav>
      <div class="sidebar-footer">
        <div class="user-info" id="userEmail"></div>
        <button class="btn-logout" id="logoutBtn" type="button">
          <i class="ti ti-logout" aria-hidden="true"></i>ログアウト
        </button>
      </div>
    </aside>

    <main class="main-content">
      <div class="page-header">
        <h1 class="page-title">ダッシュボード</h1>
      </div>

      <div id="deadlineBanner" class="deadline-banner safe" style="display:none">
        <i class="ti ti-calendar-event" aria-hidden="true"></i>
        <span id="deadlineText"></span>
      </div>

      <div id="loadingEl" class="loading">
        <i class="ti ti-loader-2 ti-spin" aria-hidden="true"></i> 読み込み中...
      </div>

      <div id="dashContent" style="display:none">
        <!-- サマリー -->
        <div class="stat-grid" id="statGrid"></div>

        <!-- ファネル -->
        <div class="card" style="margin-top:20px">
          <div class="card-header"><strong>パイプライン（ファネル）</strong></div>
          <div class="card-body" id="funnelEl"></div>
        </div>

        <div style="display:grid;grid-template-columns:1fr 1fr;gap:16px;margin-top:20px" id="breakdownGrid">
          <!-- フェーズ別（A1: 5フェーズ＋失注） -->
          <div class="card">
            <div class="card-header"><strong>フェーズ別</strong></div>
            <div class="card-body" id="statusBreakdown"></div>
          </div>
          <!-- 流入元別 -->
          <div class="card">
            <div class="card-header"><strong>流入元別</strong></div>
            <div class="card-body" id="sourceBreakdown"></div>
          </div>
        </div>
      </div>
    </main>
  </div>

  <script src="/js/mobilenav.js"></script>
  <script src="/js/firebase-config.js"></script>
  <script src="/js/dashboard.js" type="module"></script>
</body>
</html>
