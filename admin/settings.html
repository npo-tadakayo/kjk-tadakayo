<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>設定 — タダカヨ CRM</title>
  <link rel="icon" type="image/png" href="/favicon.png">
  <link rel="apple-touch-icon" href="/favicon.png">
  <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/@tabler/icons-webfont@3.24.0/dist/tabler-icons.min.css">
  <link rel="stylesheet" href="/css/crm.css">
</head>
<body>
  <div class="layout">
    <aside class="sidebar">
      <div class="sidebar-brand"><div class="app-name">タダカヨ CRM</div><div class="app-sub">介護情報基盤伴走支援</div></div>
      <nav class="sidebar-nav" id="nav"></nav>
      <div class="sidebar-footer">
        <div class="user-info" id="userEmail"></div>
        <button class="btn-logout" id="logoutBtn" type="button"><i class="ti ti-logout" aria-hidden="true"></i>ログアウト</button>
      </div>
    </aside>
    <main class="main-content">
      <div class="page-header"><h1 class="page-title">設定</h1></div>

      <div class="card" style="max-width:720px">
        <div class="card-header"><span style="font-weight:600;font-size:14px">通知・送信の設定</span></div>
        <div class="card-body" id="loadingEl"><i class="ti ti-loader-2 ti-spin" aria-hidden="true"></i> 読み込み中...</div>
        <div class="card-body" id="form" style="display:none">
          <div class="form-group">
            <label class="form-label" for="chatWebhookUrl">Google Chat Webhook URL</label>
            <input class="form-control" id="chatWebhookUrl" type="text" placeholder="https://chat.googleapis.com/v1/spaces/.../messages?key=...&token=...">
            <p style="font-size:12px;color:var(--color-ink-muted);margin-top:4px">LP問い合わせ・見積もり成約・日次フォローアップの通知先。変更は即時反映（最大60秒）。</p>
          </div>
          <div class="form-group">
            <label class="form-label" for="gmailSender">メール送信元アドレス</label>
            <input class="form-control" id="gmailSender" type="email" placeholder="kjk-staff@tadakayo.jp">
            <p style="font-size:12px;color:var(--color-ink-muted);margin-top:4px">案件詳細からのメール送信の差出人（DWD登録済みの正規アカウントのみ）。</p>
          </div>
          <div id="saveStatus" style="font-size:13px;margin-bottom:8px"></div>
          <div style="display:flex;gap:8px;justify-content:space-between;flex-wrap:wrap">
            <button class="btn btn-secondary" id="testBtn" type="button"><i class="ti ti-bell" aria-hidden="true"></i> Chatにテスト通知</button>
            <button class="btn btn-primary" id="saveBtn" type="button"><i class="ti ti-device-floppy" aria-hidden="true"></i> 保存</button>
          </div>
        </div>
      </div>
    </main>
  </div>
  <div id="toast" role="status" aria-live="polite" aria-atomic="true"
    style="position:fixed;bottom:24px;left:50%;transform:translateX(-50%);background:#2C2416;color:#fff;padding:10px 18px;border-radius:8px;font-size:13px;display:none;z-index:100"></div>
  <script src="/js/firebase-config.js"></script>
  <script src="/js/settings.js" type="module"></script>
</body>
</html>
