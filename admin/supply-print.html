<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>帳票 — タダカヨ CRM</title>
  <link rel="icon" type="image/png" href="/favicon.png">
  <link rel="apple-touch-icon" href="/favicon.png">
  <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/@tabler/icons-webfont@3.24.0/dist/tabler-icons.min.css">
  <style>
    :root{--ink:#2C2416;--muted:#6a5e48;--line:#E8E4DC;--brand:#238e3a;--bg:#FAFAF8;}
    *{box-sizing:border-box;}
    body{margin:0;background:var(--bg);color:var(--ink);font-family:"Hiragino Sans","Noto Sans JP",system-ui,sans-serif;font-size:13px;line-height:1.7;}
    .toolbar{position:sticky;top:0;display:flex;justify-content:space-between;gap:12px;padding:12px 20px;background:#fff;border-bottom:1px solid var(--line);z-index:10;}
    .btn{border:none;border-radius:8px;padding:10px 18px;font-size:14px;cursor:pointer;display:inline-flex;align-items:center;gap:6px;text-decoration:none;}
    .btn-print{background:var(--brand);color:#fff;} .btn-back{background:var(--line);color:var(--ink);}
    .sheet{max-width:800px;margin:20px auto;background:#fff;border:1px solid var(--line);border-radius:6px;padding:48px 56px;}
    .doc-head{display:flex;justify-content:space-between;align-items:flex-start;margin-bottom:8px;}
    h1.title{font-family:"Noto Serif JP",serif;font-size:24px;letter-spacing:.2em;border-bottom:3px solid var(--brand);padding-bottom:8px;margin:0 0 20px;}
    .issuer{text-align:right;font-size:12px;color:var(--muted);}
    .issuer .org{font-family:"Noto Serif JP",serif;font-size:14px;color:var(--ink);}
    .to{font-size:16px;font-weight:600;margin-bottom:6px;}
    table.items{width:100%;border-collapse:collapse;margin:20px 0;}
    table.items th,table.items td{border:1px solid var(--line);padding:8px 10px;text-align:left;}
    table.items th{background:var(--bg);font-size:12px;}
    table.items td.num{text-align:right;}
    .meta{font-size:12px;color:var(--muted);}
    .total-row td{font-weight:700;background:var(--bg);}
    .note{margin-top:16px;font-size:12px;white-space:pre-wrap;}
    .footer{margin-top:36px;padding-top:14px;border-top:1px solid var(--line);font-size:11px;color:var(--muted);text-align:center;}
    .loading{text-align:center;padding:60px;color:var(--muted);}
    /* 発注書（ABサークル様サンプル準拠） */
    .po-title{text-align:center;font-family:"Noto Serif JP",serif;font-size:26px;letter-spacing:.4em;font-weight:700;margin:0 0 28px;}
    .po-head{display:flex;justify-content:space-between;gap:24px;margin-bottom:28px;}
    .po-to{flex:1;}
    .po-to-name{font-size:18px;font-weight:600;}
    .po-total{margin-top:24px;font-size:14px;color:var(--muted);}
    .po-total strong{font-size:30px;color:var(--ink);margin-left:14px;font-weight:700;}
    .po-issuer{flex:0 0 300px;font-size:12px;color:#444;line-height:1.7;}
    .po-no{font-size:13px;color:var(--ink);margin-bottom:2px;}
    .po-no span{color:var(--muted);margin-right:18px;}
    .po-org{font-weight:600;font-size:13px;margin:10px 0 2px;color:var(--ink);}
    table.po-items{width:100%;border-collapse:collapse;margin-bottom:10px;}
    table.po-items th{border-bottom:1.5px solid #888;padding:8px 6px;font-size:12px;color:var(--muted);font-weight:500;text-align:left;}
    table.po-items td{border-bottom:1px solid var(--line);padding:14px 6px;font-size:14px;vertical-align:top;}
    table.po-items .num{text-align:right;}
    table.po-sum{margin-left:auto;width:300px;border-collapse:collapse;}
    table.po-sum td{padding:8px 6px;font-size:14px;border-bottom:1px solid var(--line);}
    table.po-sum td.lbl{color:var(--muted);}
    table.po-sum td.num{text-align:right;}
    table.po-sum tr.grand td{font-size:16px;border-bottom:none;border-top:1.5px solid #888;}
    .po-note{margin-top:24px;font-size:12px;color:#555;}
    .po-orderer{display:flex;justify-content:flex-end;align-items:center;gap:16px;margin-top:36px;}
    .po-orderer-name{font-size:15px;}
    .po-seal{
      width:64px;height:64px;border:2.5px solid #c0392b;border-radius:50%;
      color:#c0392b;display:flex;align-items:center;justify-content:center;
      font-family:"Noto Serif JP",serif;font-weight:700;font-size:18px;line-height:1.05;
      writing-mode:vertical-rl;letter-spacing:3px;transform:rotate(-5deg);
      -webkit-print-color-adjust:exact;print-color-adjust:exact;
    }
    .po-seal-img{
      width:72px;height:72px;object-fit:contain;transform:rotate(-3deg);
      -webkit-print-color-adjust:exact;print-color-adjust:exact;
    }
    /* 角印（会社印）と発注元レイアウト（請求書・発注書共通） */
    .seal-kaku{width:78px;height:78px;flex:0 0 auto;display:flex;flex-wrap:wrap;border:3px solid #c0392b;border-radius:6px;color:#c0392b;font-family:"Noto Serif JP",serif;font-weight:700;transform:rotate(-3deg);-webkit-print-color-adjust:exact;print-color-adjust:exact;}
    .seal-kaku span{width:50%;height:50%;display:flex;align-items:center;justify-content:center;font-size:23px;line-height:1;}
    .po-company{display:flex;align-items:center;gap:10px;margin-top:8px;}
    .po-company-info{flex:1;}
    .po-company-info .po-org{margin-top:0;}
    .seal-kaku-img{width:82px;height:82px;object-fit:contain;flex:0 0 auto;transform:rotate(-3deg);-webkit-print-color-adjust:exact;print-color-adjust:exact;}
    .issuer-wrap{display:flex;align-items:flex-start;gap:12px;justify-content:flex-end;}

    /* 請求書（見積書の赤系を踏襲） */
    .inv .doc-head{display:flex;justify-content:space-between;align-items:flex-start;margin-bottom:8px;}
    .inv-title{font-family:"Noto Serif JP",serif;font-size:24px;letter-spacing:.3em;color:#E33535;border-bottom:3px solid #E33535;padding-bottom:8px;margin:0 0 20px;}
    .inv .grand{background:#FFE4EC;border:1px solid #E33535;border-radius:6px;padding:10px 14px;font-size:15px;margin:8px 0 16px;}
    .inv .grand strong{font-size:20px;color:#c02828;}
    .inv .total-row td{font-weight:700;background:#FFF8F8;color:#c02828;}
    .inv .pay{margin-top:18px;border:1px dashed var(--line);border-radius:6px;padding:12px;}
    /* レターパックプラス(赤) 宛名ラベル（実物準拠・A4印刷→切り取り） */
    .lp-note{font-size:12px;color:var(--muted);margin-bottom:8px;}
    .lp-label{
      --lp:#E2001A;
      width:120mm; box-sizing:border-box;
      border:1.5px dashed var(--lp); border-radius:4px; padding:6mm 7mm;
      background:#fff;
    }
    .lp-label.blue{ --lp:#0068B7; }
    .lp-brand{font-weight:700;color:var(--lp);font-size:15px;letter-spacing:.05em;border-bottom:2px solid var(--lp);padding-bottom:4px;margin-bottom:8px;display:flex;justify-content:space-between;align-items:baseline;}
    .lp-brand span{font-size:12px;border:1px solid var(--lp);border-radius:3px;padding:1px 6px;}
    .lp-sec{background:var(--lp);color:#fff;font-size:12px;font-weight:700;padding:2px 8px;border-radius:3px;margin:10px 0 6px;display:inline-block;}
    .lp-row{display:flex;align-items:center;gap:8px;border-bottom:1px solid #e3e3e3;padding:5px 2px;min-height:30px;}
    .lp-row.tall{min-height:46px;align-items:flex-start;}
    .lp-row.big{min-height:40px;}
    .lp-k{flex:0 0 56px;font-size:11px;color:var(--lp);font-weight:700;}
    .lp-v{flex:1;font-size:15px;}
    .lp-addr{font-size:16px;line-height:1.5;}
    .lp-name{font-size:22px;font-weight:700;}
    .lp-keisho{font-size:14px;font-weight:400;}
    .lp-zipmark{color:var(--lp);font-weight:700;font-size:16px;}
    .zip .zbox{display:inline-block;width:9mm;height:11mm;line-height:11mm;border:1px solid var(--lp);border-radius:2px;text-align:center;margin:0 1px;font-size:16px;font-weight:700;vertical-align:middle;}
    @media print{.toolbar{display:none;}body{background:#fff;}.sheet{max-width:none;margin:0;border:none;border-radius:0;padding:0;}@page{margin:18mm 16mm;}}
  </style>
</head>
<body>
  <div class="toolbar">
    <a class="btn btn-back" href="/supply.html"><i class="ti ti-arrow-left"></i> 供給管理へ</a>
    <div id="lpControls" style="display:none;align-items:center;gap:10px;flex:1;justify-content:center">
      <label style="font-size:13px">種別
        <select id="lpVariant" style="padding:6px 8px;border-radius:6px;border:1px solid var(--line);font-size:13px">
          <option value="plus">レターパックプラス（赤・600円）</option>
          <option value="light">レターパックライト（青・430円）</option>
        </select>
      </label>
      <label style="font-size:13px">差出人
        <select id="lpSender" style="padding:6px 8px;border-radius:6px;border:1px solid var(--line);font-size:13px"></select>
      </label>
    </div>
    <button class="btn btn-print" id="printBtn" type="button"><i class="ti ti-printer"></i> 印刷 / PDF保存</button>
  </div>
  <div class="sheet"><div class="loading" id="loadingEl"><i class="ti ti-loader-2 ti-spin"></i> 読み込み中...</div>
    <div id="body" style="display:none"></div></div>
  <script src="/js/firebase-config.js"></script>
  <script src="/js/supply-print.js" type="module"></script>
</body>
</html>
