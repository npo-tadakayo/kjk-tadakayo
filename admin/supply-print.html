<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>帳票 — タダカヨ CRM</title>
  <link rel="icon" type="image/png" href="/favicon.png">
  <link rel="apple-touch-icon" href="/favicon.png">
  <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/@tabler/icons-webfont@3.24.0/dist/tabler-icons.min.css">
  <style>
    :root{--ink:#2C2416;--muted:#6a5e48;--line:#E8E4DC;--brand:#238e3a;--bg:#FAFAF8;}
    *{box-sizing:border-box;}
    body{margin:0;background:var(--bg);color:var(--ink);font-family:"Hiragino Sans","Noto Sans JP",system-ui,sans-serif;font-size:13px;line-height:1.7;}
    .toolbar{position:sticky;top:0;display:flex;justify-content:space-between;gap:12px;padding:12px 20px;background:#fff;border-bottom:1px solid var(--line);z-index:10;}
    .btn{border:none;border-radius:8px;padding:10px 18px;font-size:14px;cursor:pointer;display:inline-flex;align-items:center;gap:6px;text-decoration:none;}
    .btn-print{background:var(--brand);color:#fff;} .btn-back{background:var(--line);color:var(--ink);}
    .sheet{max-width:800px;margin:20px auto;background:#fff;border:1px solid var(--line);border-radius:6px;padding:48px 56px;}
    .doc-head{display:flex;justify-content:space-between;align-items:flex-start;margin-bottom:8px;}
    h1.title{font-family:"Noto Serif JP",serif;font-size:24px;letter-spacing:.2em;border-bottom:3px solid var(--brand);padding-bottom:8px;margin:0 0 20px;}
    .issuer{text-align:right;font-size:12px;color:var(--muted);}
    .issuer .org{font-family:"Noto Serif JP",serif;font-size:14px;color:var(--ink);}
    .to{font-size:16px;font-weight:600;margin-bottom:6px;}
    table.items{width:100%;border-collapse:collapse;margin:20px 0;}
    table.items th,table.items td{border:1px solid var(--line);padding:8px 10px;text-align:left;}
    table.items th{background:var(--bg);font-size:12px;}
    table.items td.num{text-align:right;}
    .meta{font-size:12px;color:var(--muted);}
    .total-row td{font-weight:700;background:var(--bg);}
    .note{margin-top:16px;font-size:12px;white-space:pre-wrap;}
    .footer{margin-top:36px;padding-top:14px;border-top:1px solid var(--line);font-size:11px;color:var(--muted);text-align:center;}
    .loading{text-align:center;padding:60px;color:var(--muted);}
    @media print{.toolbar{display:none;}body{background:#fff;}.sheet{max-width:none;margin:0;border:none;border-radius:0;padding:0;}@page{margin:18mm 16mm;}}
  </style>
</head>
<body>
  <div class="toolbar">
    <a class="btn btn-back" href="/supply.html"><i class="ti ti-arrow-left"></i> 供給管理へ</a>
    <button class="btn btn-print" id="printBtn" type="button"><i class="ti ti-printer"></i> 印刷 / PDF保存</button>
  </div>
  <div class="sheet"><div class="loading" id="loadingEl"><i class="ti ti-loader-2 ti-spin"></i> 読み込み中...</div>
    <div id="body" style="display:none"></div></div>
  <script src="/js/firebase-config.js"></script>
  <script src="/js/supply-print.js" type="module"></script>
</body>
</html>
