<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>カンバンボード — タダカヨ CRM</title>
  <link rel="icon" type="image/png" href="/favicon.png">
  <link rel="apple-touch-icon" href="/favicon.png">
  <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/@tabler/icons-webfont@3.24.0/dist/tabler-icons.min.css">
  <link rel="stylesheet" href="/css/crm.css">
</head>
<body>
  <div class="layout">
    <!-- サイドバー -->
    <aside class="sidebar">
      <div class="sidebar-brand">
        <div class="app-name">タダカヨ CRM</div>
        <div class="app-sub">介護情報基盤伴走支援</div>
      </div>
      <nav class="sidebar-nav" id="nav"></nav>
      <div class="sidebar-footer">
        <div class="user-info" id="userEmail"></div>
        <button class="btn-logout" id="logoutBtn" type="button">
          <i class="ti ti-logout" aria-hidden="true"></i>ログアウト
        </button>
      </div>
    </aside>

    <!-- メインコンテンツ -->
    <main class="main-content">
      <div class="page-header">
        <h1 class="page-title">カンバンボード</h1>
      </div>

      <!-- 申請期限バナー -->
      <div id="deadlineBanner" class="deadline-banner safe" style="display:none">
        <i class="ti ti-calendar-event" aria-hidden="true"></i>
        <span id="deadlineText"></span>
      </div>

      <!-- 全体アラート -->
      <div class="alert-bar" id="alertBar"></div>

      <!-- フィルタ -->
      <div class="filter-bar">
        <input type="search" id="searchInput" placeholder="事業所名・担当者で検索..." style="flex:1; min-width:200px;">
        <select id="sourceFilter">
          <option value="">すべての流入</option>
          <option value="lp_inquiry">LP問い合わせ</option>
          <option value="mitsumori_quote">見積もり成約</option>
          <option value="manual">手動登録</option>
        </select>
      </div>

      <div id="loadingEl" class="loading">
        <i class="ti ti-loader-2 ti-spin" aria-hidden="true"></i> 読み込み中...
      </div>

      <!-- カンバン本体 -->
      <div class="kanban-board" id="kanbanBoard" style="display:none"></div>
    </main>
  </div>

  <!-- トースト -->
  <div id="toast" role="status" aria-live="polite" aria-atomic="true"
       style="position:fixed;bottom:24px;left:50%;transform:translateX(-50%);background:#2C2416;color:#fff;padding:10px 18px;border-radius:8px;font-size:13px;display:none;z-index:100;"></div>

  <script src="/js/sidebar.js"></script>

  <script src="/js/mobilenav.js"></script>
  <script src="/js/firebase-config.js"></script>
  <script src="/js/kanban.js" type="module"></script>
</body>
</html>
